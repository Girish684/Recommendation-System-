<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineMatch Movie Recommender</title>
    <link rel="preconnect" href="https://image.tmdb.org" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="Recommendation preferences">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">CM</div>
          <div>
            <p class="eyebrow">Movie recommendation system</p>
            <h1>CineMatch</h1>
          </div>
        </div>

        <div class="field-group">
          <label for="searchInput">Search title, actor, director, or keyword</label>
          <div class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="Try Nolan, comedy, space..." />
          </div>
        </div>

        <div class="field-group">
          <div class="label-row">
            <label>Genres</label>
            <button class="ghost-button" id="clearGenres" type="button">Clear</button>
          </div>
          <div class="chip-grid" id="genreChips" aria-label="Select genres"></div>
        </div>

        <div class="field-group">
          <label for="moodSelect">Mood</label>
          <select id="moodSelect">
            <option value="any">Any mood</option>
            <option value="Thoughtful">Thoughtful</option>
            <option value="Feel-good">Feel-good</option>
            <option value="Intense">Intense</option>
            <option value="Funny">Funny</option>
            <option value="Romantic">Romantic</option>
            <option value="Mind-bending">Mind-bending</option>
          </select>
        </div>

        <div class="field-group two-column">
          <div>
            <label for="decadeSelect">Decade</label>
            <select id="decadeSelect">
              <option value="any">Any</option>
              <option value="2020">2020s</option>
              <option value="2010">2010s</option>
              <option value="2000">2000s</option>
              <option value="1990">1990s</option>
              <option value="1980">1980s</option>
            </select>
          </div>
          <div>
            <label for="runtimeSelect">Runtime</label>
            <select id="runtimeSelect">
              <option value="any">Any</option>
              <option value="short">Under 100m</option>
              <option value="medium">100-140m</option>
              <option value="long">140m+</option>
            </select>
          </div>
        </div>

        <div class="field-group">
          <label for="ratingRange">Minimum rating <span id="ratingValue">7.0</span></label>
          <input id="ratingRange" type="range" min="6" max="9" step="0.1" value="7" />
        </div>

        <div class="field-group">
          <label>Movies you liked</label>
          <div class="liked-list" id="likedList"></div>
        </div>

        <button class="primary-button" id="resetButton" type="button">Reset preferences</button>
      </section>

      <section class="results-panel">
        <div class="results-header">
          <div>
            <p class="eyebrow">Personalized picks</p>
            <h2 id="resultsTitle">Recommended for you</h2>
          </div>
          <div class="stat-pill">
            <strong id="resultCount">0</strong>
            <span>matches</span>
          </div>
        </div>

        <div class="spotlight" id="spotlight" aria-live="polite"></div>
        <div class="movie-grid" id="movieGrid" aria-live="polite"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
